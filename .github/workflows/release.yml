name: Beta Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build, Modify, and Release Beta
    runs-on: macos-26

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # مطلوب لـ agvtool وملاحظات الإصدار
          submodules: recursive

      - name: Use Xcode 26.2
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Modify App Info (Name and Bundle ID)
        run: |
          INFO_PLIST_PATH="Feather/Resources/Info.plist"
          if [ ! -f "$INFO_PLIST_PATH" ]; then
            echo "Error: Info.plist not found at $INFO_PLIST_PATH. Please verify the path."
            exit 1
          fi

          echo "Modifying Info.plist at: $INFO_PLIST_PATH"

          # استخدام plutil للتعديل الآمن لتفادي أخطاء عدم وجود المفتاح مسبقاً
          plutil -replace CFBundleDisplayName -string "ATTACK STORE" "$INFO_PLIST_PATH"
          plutil -replace CFBundleName -string "ATTACK STORE" "$INFO_PLIST_PATH"
          plutil -replace CFBundleIdentifier -string "app.attackstore" "$INFO_PLIST_PATH"

          echo "App name and Bundle ID updated successfully."

      - name: Set iOS 15 Deployment Target
        run: |
          INFO_PLIST_PATH="Feather/Resources/Info.plist"
          echo "Updating deployment targets to iOS 15.0..."
          
          # 1. تحديث MinimumOSVersion في ملف Info.plist
          if [ -f "$INFO_PLIST_PATH" ]; then
            plutil -replace MinimumOSVersion -string "15.0" "$INFO_PLIST_PATH" || true
          fi
          
          # 2. البحث عن ملفات إعدادات Xcode وتعديل الـ Deployment Target
          find . -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' {} +
          
          # 3. تعديل الـ Makefile (إذا كان البناء يعتمد على Theos/Make)
          if [ -f "Makefile" ]; then
            sed -i '' 's/TARGET.*=.*/TARGET = iphone:clang:latest:15.0/g' Makefile || true
          fi

          # 4. تعديل Package.swift (إن وجدت حزم Swift مرتبطة)
          if [ -f "Package.swift" ]; then
            sed -i '' 's/\.iOS(.v[0-9]*)/\.iOS(.v15)/g' Package.swift || true
          fi

      - name: Update Version with agvtool
        run: |
          agvtool new-version -all $(git rev-parse HEAD) || true

      - name: Build and Verify
        run: |
          make iphoneos # استخدام make iphoneos كما في Workflow الأول
          mkdir -p upload
          find . -name "*.ipa" -exec mv {} upload/ \; # نقل ملفات IPA إلى مجلد upload
          test -n "$(find upload -name "*.ipa" -print -quit)" # التحقق من وجود ملف IPA

      - name: Get Version from Info.plist
        id: get_version
        run: |
          INFO_PLIST_PATH="Feather/Resources/Info.plist"
          # استخدام plutil لاستخراج رقم الإصدار بشكل آمن ونظيف
          VERSION=$(plutil -extract CFBundleShortVersionString raw "$INFO_PLIST_PATH" 2>/dev/null || echo "1.0.0")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Release Directly
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # استخدام GITHUB_TOKEN المتاح تلقائياً
        run: |
          LATEST_OFFICIAL_TAG=$(git ls-remote --tags --refs origin "v*" | awk -F/ '{print $3}' | sort -V | tail -1 || echo "")

          COMMIT_MSG=$(git log -1 --pretty=%B)

          NOTES="## Commit: \`$COMMIT_MSG\` (${{ github.sha }})"
          if [ -n "$LATEST_OFFICIAL_TAG" ]; then
            NOTES+=$'\n'"### New compared to $LATEST_OFFICIAL_TAG:"
            NOTES+=$'\n'"[View full changes](https://github.com/${{ github.repository }}/compare/${LATEST_OFFICIAL_TAG}...${{ github.sha }})"
          else
            NOTES+=$'\n'"### Initial beta build"
          fi

          # ✅ حل مشكلة التاج: جعلنا التاج يتغير تلقائياً في كل مرة بناء لتفادي الحظر
          NEW_TAG="beta-${{ github.run_number }}"

          # إنشاء إصدار جديد باستخدام gh CLI
          gh release create "$NEW_TAG" "upload/*.ipa" \
            --title "ATTACK STORE v${{ env.VERSION }}" \
            --notes "$NOTES" \
            --prerelease \
            --target ${{ github.sha }}
