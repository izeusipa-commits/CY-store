name: Release SY STORE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'true'
          fetch-depth: 0 # جلب كافة التاريخ لضمان حساب الـ commits بدقة

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Compile SY STORE
        run: | 
          # 1. إرجاع إصدار الماك إلى 13 المدعوم
          find . -name "Package.swift" -exec sed -i '' 's/\.macOS(\.v15)/\.macOS(\.v13)/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.macOS(\.v16)/\.macOS(\.v13)/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.macOS(\.v14)/\.macOS(\.v13)/g' {} + || true
          
          # 2. تغيير إصدارات الآيفون والتلفاز فقط إلى 15 بشكل آمن
          find . -name "Package.swift" -exec sed -i '' 's/\.iOS(\.v1[0-9])/\.iOS(\.v15)/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.tvOS(\.v1[0-9])/\.tvOS(\.v15)/g' {} + || true

          # 3. الإصلاحات التلقائية لأكواد iOS 16 في التطبيق الأساسي
          find . -name "*.swift" -exec sed -i '' 's/URL\.documentsDirectory/FileManager.default.urls(for: .documentDirectory, in: .userDomainMask).first!/g' {} + || true
          find . -name "*.swift" -exec sed -i '' 's/\.scrollDismissesKeyboard(\.interactively)//g' {} + || true
          find . -name "*.swift" -exec sed -i '' 's/\.contentTransition(\.numericText())//g' {} + || true
          find . -name "*.swift" -exec sed -i '' 's/Image(systemName: "checkmark")\.bold()/Image(systemName: "checkmark").font(.body.weight(.bold))/g' {} + || true
          
          # 🔥 الحل البديل والأسرع: حساب عدد الـ Commits وتمريره كـ Build Number رقمي نقي ومستقر
          BUILD_NUMBER=$(git rev-list --count HEAD)
          xcrun agvtool new-version -all "$BUILD_NUMBER" || true
          
          # بدء عملية التجميع
          make
          mkdir upload
          mv packages/* upload/

      - name: Extract Version
        id: get_version
        run: |
          # التحقق مما إذا كان السحب تم عن طريق تاغ أصلي أو تشغيل يدوي
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            TAG_NAME="${{ github.ref_name }}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            DATE_STR=$(date +'%Y.%m.%d')
            VERSION="v${DATE_STR}-${SHORT_SHA}"
            TAG_NAME="v${DATE_STR}-${SHORT_SHA}"
          fi
          
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SY STORE ${{ env.VERSION }}
          tag_name: ${{ env.TAG_NAME }}
          target_commitish: ${{ github.sha }}
          files: |
            upload/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
