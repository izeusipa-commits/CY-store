name: Release CY STORE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 🔥 الحل الجذري والذكي: إلغاء أي بناء قديم معلق تلقائياً بمجرد إطلاق بناء جديد لتفريغ السيرفر فوراً
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    # استخدام سيرفر مخصص ومستقر لتقليل وقت الانتظار في الطوابير العامة
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'true'
          fetch-depth: 1 # جلب النسخة السطحية السريعة لتوفير وقت التحميل

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2' # إصدار ثابت ومثبت مسبقاً لتفادي تضييع الوقت في البحث

      - name: Compile CY STORE
        run: | 
          # 1. إرجاع إصدار الماك إلى 13 المدعوم
          find . -name "Package.swift" -exec sed -i '' 's/\.macOS(\.v15)/\.macOS(\.v13)/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.macOS(\.v16)/\.macOS(\.v13)/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.macOS(\.v14)/\.macOS(\.v13)/g' {} + || true
          
          # 2. تغيير إصدارات الآيفون والتلفاز فقط إلى 15 بشكل آمن
          find . -name "Package.swift" -exec sed -i '' 's/\.iOS(\.v1[0-9])/\.iOS(\.v15)/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.tvOS(\.v1[0-9])/\.tvOS(\.v15)/g' {} + || true

          # 3. الإصلاحات التلقائية لأكواد iOS 16 في التطبيق الأساسي
          find . -name "*.swift" -exec sed -i '' 's/URL\.documentsDirectory/FileManager.default.urls(for: .documentDirectory, in: .userDomainMask).first!/g' {} + || true
          find . -name "*.swift" -exec sed -i '' 's/\.scrollDismissesKeyboard(\.interactively)//g' {} + || true
          find . -name "*.swift" -exec sed -i '' 's/\.contentTransition(\.numericText())//g' {} + || true
          find . -name "*.swift" -exec sed -i '' 's/Image(systemName: "checkmark")\.bold()/Image(systemName: "checkmark").font(.body.weight(.bold))/g' {} + || true
          
          # رقم بناء ثابت وسريع ومستقر
          xcrun agvtool new-version -all "100" || true
          
          # بدء عملية التجميع
          make
          mkdir upload
          mv packages/* upload/

      - name: Extract Version
        id: get_version
        run: |
          DATE_STR=$(date +'%Y.%m.%d')
          VERSION="v${DATE_STR}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: CY STORE ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          target_commitish: ${{ github.sha }}
          files: |
            upload/*
          generate_release_notes: false
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
