name: Release SY STORE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # 🔥 تغيير السيرفر إلى macos-13 لضمان حجز سريع جداً وتقليل وقت الانتظار (Queue)
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'true'
          fetch-depth: 1 # 🔥 تم تقليله من 0 إلى 1 لسرعة تحميل الكود (Shallow Clone) وتوفير الوقت

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2' # 🔥 تحديد إصدار محدد مدعوم ومثبت مسبقاً بدلاً من البحث عن أحدث نسخة مستقرة

      - name: Compile SY STORE
        run: | 
          # 1. إرجاع إصدار الماك إلى 13 المدعوم
          find . -name "Package.swift" -exec sed -i '' 's/\.macOS(\.v15)/\.macOS(\.v13)/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.macOS(\.v16)/\.macOS(\.v13)/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.macOS(\.v14)/\.macOS(\.v13)/g' {} + || true
          
          # 2. تغيير إصدارات الآيفون والتلفاز فقط إلى 15 بشكل آمن
          find . -name "Package.swift" -exec sed -i '' 's/\.iOS(\.v1[0-9])/\.iOS(\.v15)/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.tvOS(\.v1[0-9])/\.tvOS(\.v15)/g' {} + || true

          # 3. الإصلاحات التلقائية لأكواد iOS 16 في التطبيق الأساسي
          find . -name "*.swift" -exec sed -i '' 's/URL\.documentsDirectory/FileManager.default.urls(for: .documentDirectory, in: .userDomainMask).first!/g' {} + || true
          find . -name "*.swift" -exec sed -i '' 's/\.scrollDismissesKeyboard(\.interactively)//g' {} + || true
          find . -name "*.swift" -exec sed -i '' 's/\.contentTransition(\.numericText())//g' {} + || true
          find . -name "*.swift" -exec sed -i '' 's/Image(systemName: "checkmark")\.bold()/Image(systemName: "checkmark").font(.body.weight(.bold))/g' {} + || true
          
          # تقليص الوقت بوضع رقم بناء ثابت سريع جداً لا يعتمد على الـ Git تاريخياً
          xcrun agvtool new-version -all "100" || true
          
          # بدء عملية التجميع
          make
          mkdir upload
          mv packages/* upload/

      - name: Extract Version
        id: get_version
        run: |
          DATE_STR=$(date +'%Y.%m.%d')
          VERSION="v${DATE_STR}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SY STORE ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          target_commitish: ${{ github.sha }}
          files: |
            upload/*
          generate_release_notes: false # 🔥 إلغاء توليد الملاحظات تلقائياً لتسريع إنهاء الأكشن
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
